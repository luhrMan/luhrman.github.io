<!-- Custom head: SVG tab icon if no favicon.png (Thulite SEO skips all favicon links without it) -->
{{- if and (not (resources.Get "favicon.png")) (resources.Get "favicon.svg") }}
  {{- with resources.Get "favicon.svg" }}
  <link rel="icon" href="{{ .RelPermalink }}" type="image/svg+xml" sizes="any">
  {{- end }}
{{- end }}
