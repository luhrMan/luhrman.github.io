<footer class="footer text-muted">
  <div class="container-{{ site.Params.doks.containerBreakpoint | default "lg" }}">
    <div class="row">
      <div class="col-lg-8 text-lg-start">
        <ul class="list-inline">
          {{ range .Site.Menus.footer -}}
            <li class="list-inline-item"><a class="text-muted" href="{{ .URL | relURL }}">{{ .Name }}</a></li>
          {{- end }}
        </ul>
      </div>
      <div class="col-lg-8 text-lg-end">
        <ul class="list-inline">
          <li class="list-inline-item">{{ site.Params.footer | safeHTML }}</li>
          {{ with site.Data.sqyre_meta -}}
          <li class="list-inline-item"><small class="text-muted">Docs synced from <a href="{{ .repo_url }}">upstream</a> @ <code>{{ substr .commit 0 7 }}</code> · {{ .synced_at }}</small></li>
          {{- end }}
        </ul>
      </div>
    </div>
  </div>
</footer>
